program: main.py
method: bayes
metric:
  name: train/return
  goal: maximize
parameters:
  unroll_len:
    distribution: int_uniform
    min: 20
    max: 100
  actor_lr:
    distribution: log_uniform
    min: -8
    max: -10
  critic_lr:
    distribution: log_uniform
    min: 0.01
    max: 1.0
  batch_size:
    distribution: int_uniform
    min: 2
    max: 32
early_terminate:
  type: hyperband
  s: 2
  eta: 3
  max_iter: 27
