program: main.py
method: bayes
metric:
  name: return
  goal: maximize
parameters:
  trajectory_len:
    distribution: int_uniform
    min: 5
    max: 20
  batch_size:
    distribution: int_uniform
    min: 32
    max: 64
  critic_lr:
    distribution: log_uniform
    max: -3
    min: -5
early_terminate:
  type: hyperband
  s: 2
  eta: 3
  max_iter: 27
